name: Tests

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }}, ${{ matrix.resolution }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.13"]
        resolution: [highest, lowest-direct]
        include:
          - os: ubuntu-latest
            python-version: "3.10"
            resolution: highest
          - os: ubuntu-latest
            python-version: "3.10"
            resolution: lowest-direct

    steps:
    - uses: actions/checkout@v4

    - uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --group dev --resolution ${{ matrix.resolution }}

    - name: Run tests
      run: uv run pytest tests/ -v --tb=short
